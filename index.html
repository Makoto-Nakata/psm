const TYPE_GOOD={'自律戦略家':'キャリアビジョンと状況把握力を兼ね備え、自分の立ち位置を常に意識しながら成長機会を戦略的につかめる。周囲への影響力も高い。','キャリアビジョナリー':'長期的な自分の姿を描き、チームへの方向づけも同時に行える。ビジョンと自律的行動が連動した理想的なリーダー像。','キャリアオーナー':'自らのキャリアを主体的に設計しつつ、どんな困難でもやり遂げる粘り強さを持つ。信頼性と自律性を高レベルで両立。','戦略リーダー':'本質を見抜く力と、チームへの方向づけ力を兼備。「何が重要か」を正確に捉えたうえで、組織を正しい方向に導ける。','構造的先読み型':'物事の本質を捉えながら、先を読んで準備を整えられる。問題が顕在化する前に手を打てる、組織の頼れる参謀役。','先導型ビジョナリー':'方向を示しながら、先読みで準備を整える二刀流。不確実な環境でもチームを安心させ、動かし続けられるリーダー。','実行責任者':'主体的に関与しながら、判断と実行を力強く推進できる。責任感と実行力が高次元で融合した、成果に直結するタイプ。','完遂者（ラストマン）':'難しい状況でも決断し、最後まで諦めずにやり切る。周囲が失速しても自分が最後の砦となり、組織の信頼を勝ち取る。','牽引者':'ビジョンを掲げながら、当事者意識を持って率先垂範する。言葉だけでなく行動でチームを引っ張るリーダーシップの体現者。','学習駆動リーダー':'主体性と振り返り力を組み合わせ、自分の行動を常にアップデートし続ける。経験を糧に成長し続ける、自律型リーダーの理想形。','改善実装者':'実行した結果を素直に振り返り、次に活かすサイクルを回せる。PDCAを自然体で回し、継続的に質を高め続けられる。','自律成長者':'キャリアを自ら設計しながら、経験から学ぶ力も高い。主体的に動き、失敗すら成長の糧にする自律型人材の典型。','自己実現先行型':'自分のキャリアへの意欲・行動力が高く、積極的に成長機会を探せる。自律的に動く推進力が強みで、職場への貢献意欲も高い。','自律行動家':'キャリアを自分で切り拓く主体性が強く、目標に向かって確実に動ける。実行力があり、現場での貢献度が高い。','探索型移動人材':'自らのキャリアを積極的に動かし、新しいことへの挑戦を厭わない。変化への適応力が高く、成長への意欲が行動に表れている。','事後分析型':'状況を深く読む分析力があり、起きたことの本質を鋭く言語化できる。その洞察はチームの学習に大きく貢献する。','ビジョン発信型リーダー':'ビジョンを言語化し、メンバーに理想の方向を示す力がある。大きな目標を描き、周囲を鼓舞する発信力を持つ。','高責任感型':'どんな課題も自分事として引き受ける強い当事者意識を持つ。真剣に仕事に向き合い、周囲からの信頼も厚い。','洞察提言型リーダー':'方向性や戦略を語る力に優れ、場の論点整理が得意。課題の本質を捉えた発言でチームの思考を整理できる。','強意志型リーダー':'強い主体性と当事者意識で課題に正面から向き合う。任された仕事への責任感は本物で、組織を引っ張る力がある。','実行優先型':'意思決定と実行のスピードが速く、停滞を嫌い常に前に進む。難局でもひるまず推進できる実行力が際立つ。','挑戦先行型':'キャリアに対して行動的で、新たな挑戦を積極的に取りに行く。成長への貪欲さが行動にあふれ、周囲への刺激にもなる。','環境適応型人材':'状況や環境の変化を読み取る感度が高く、外部要因の影響を的確に把握できる。組織の中で情報の入り口として機能する。','翻訳型ビジョナリー':'チームの方向性を示す力があり、上位のビジョンをわかりやすく翻訳してメンバーに伝えることができる。','我慢強い受託者':'与えられた仕事をとことんやり遂げる粘り強さが際立つ。どんな困難な状況でも諦めず、最後まで責任を持ち続ける。','夢想家':'大きなビジョンを描く力があり、理想の姿を生き生きと語れる。チームに希望や方向性を示すインスピレーション源になり得る。','直感先行型':'直感で先を読む感度が高く、動きが早い。リスクを恐れず素早くアクションを起こせる推進力がある。','慎重な実務参謀':'先を読む力があり、リスクや問題を事前に洗い出す能力に優れる。着実な準備と慎重な判断でプロジェクトを下支えする。','処理型マネージャ':'与えられた業務を正確・迅速に処理する実行力が高い。合意事項を確実にこなし、チームの実務を安定させる役割を担う。','粘り先行型':'どんな困難な場面でも粘り強く取り組む姿勢が強み。やり抜く意志と努力量は、周囲の士気を高める力を持っている。','実務職人':'チームの方向性のもと、自分の役割を確実にやり切る実務の達人。高品質な成果を安定して出し続けることができる。','内省型フォロワー':'自分の行動や判断を丁寧に振り返り、次に活かす学習サイクルが自然と身についている。着実な成長が見込めるタイプ。','深省慎重型':'自分の行動に対して誠実に向き合い、改善点を深く考える姿勢がある。真摯さと誠実さが周囲の信頼につながっている。','内省探索型':'自分の経験を丁寧に振り返る力があり、失敗を糧にして着実に成長できる。謙虚さと学習意欲が長期的な成熟をもたらす。','組織順応型':'組織のルールや指示に従って着実に動くことができる。安定した環境では確実な成果を出す、堅実なチームの一員。','模索型キャリア':'現在の業務に集中して取り組む力はある。目の前のタスクへの対応力を活かし、周囲のサポートを受けながら実績を積める。','安定志向型':'与えられた仕事を確実にこなす姿勢は持っている。周囲の期待に応えることで信頼関係を構築できるポテンシャルがある。','模索型':'柔軟性があり、固定観念にとらわれない。外からの働きかけをきっかけに大きく変われる伸びしろを持っている。','即応対処型':'目の前の状況への対応力はある。具体的な課題に向き合う経験を積むことで、状況把握と先読みの力を伸ばせる。','安定遂行型マネージャ':'指示やルールに従って確実に動く安定性がある。チームのサポート役として現場を下支えする堅実さを持っている。','観察待機型':'俯瞰的な視点で状況を観察する力がある。一歩踏み込む行動力が加わると、その観察眼を大きく活かせる。','慎重待機型':'潜在的なポテンシャルはある。適切なサポートと環境があれば、行動力と継続力を引き出せる可能性を秘めている。','協調支援型':'安定した環境で着実に動く力はある。方向性と機会が与えられれば、確実に実行する能力を発揮できる。','安定維持型':'現状維持への安心感が強く、慎重さはある。信頼できる環境・関係性が整えば、主体的な変化を起こせる可能性がある。','一貫実行型':'決められたやり方を守る安定性がある。一定のルール・方針のもとで着実な仕事をする力を持っている。','持続安定型':'継続して業務に取り組む持続力はある。外からの刺激やフィードバックをきっかけに、成長サイクルに入れる可能性がある。'};
const TYPE_BAD={'自律戦略家':'完成度が高い分、他者への期待値が上がりすぎる場合がある。「なぜわからないのか」という無意識の驕りがチームの心理的安全性を下げるリスクに注意。','キャリアビジョナリー':'ビジョンと現実のギャップを自分では感じにくい。メンバーが置いてきぼりになっていないか、現場の声を定期的に確認する必要がある。','キャリアオーナー':'粘り強さが強みの反面、撤退判断が遅くなりがち。方向性の誤りに気づいても修正しにくい傾向があり、柔軟な見直しが課題になることがある。','戦略リーダー':'高い洞察と方向づけの力があるゆえ、現場の細部や感情面が抜け落ちることがある。実行レベルのフォローと共感力の強化が成長の鍵。','構造的先読み型':'先を読みすぎてリスクを過大評価し、動き出しが遅くなることがある。「準備が整ってから」という慎重さが機会損失につながることも。','先導型ビジョナリー':'自分が先を走りすぎてチームが追いつけないことがある。引っ張るだけでなく、ペースを合わせて組織全体を動かす視点が求められる。','実行責任者':'実行力と責任感が強いゆえ、すべてを自分で抱え込みやすい。権限委譲が苦手で、チームの成長機会を奪ってしまうリスクがある。','完遂者（ラストマン）':'最後までやり切る力は強いが、過程での撤退・変更判断が弱い。完遂への固執が最適解の選択を妨げることがある。','牽引者':'引っ張る力が強い分、周囲の意見を十分に聞かずに突き進む場合がある。多様な意見を束ねる包括力をさらに磨く必要がある。','学習駆動リーダー':'学習・改善のサイクルが強い反面、完璧主義に陥りやすい。「完璧な振り返り」より「素早い実験と改善」のバランスが課題になることも。','改善実装者':'振り返りと実行の両輪は優秀だが、大きな方向転換や革新的なチャレンジには慎重になりがち。現状改善にとどまらない飛躍も必要な場面がある。','自律成長者':'自己成長への意識が高いあまり、自分の成長優先で組織への貢献が後回しになる場合がある。チームの成熟にも同等の関心を向けることが次の課題。','自己実現先行型':'自分のキャリアへの関心が高い一方、チームや組織全体の課題への感度が低い。「自分の成長」と「周囲への貢献」のバランスが課題。','自律行動家':'行動力はあるが、目の前のゴールへの集中がビジョンの欠如につながりやすい。「何のために動くか」という意味づけを周囲に伝えることが弱い。','探索型移動人材':'挑戦意欲は旺盛だが、やり切る前に次へ移ってしまう傾向がある。継続的な成果を積み上げるより、探索が目的化しやすいリスクがある。','事後分析型':'起きた後の分析は鋭いが、事前予測と準備に弱い。「あのとき〜すべきだった」と振り返ることが多く、リアルタイムの対応力に課題がある。','ビジョン発信型リーダー':'ビジョンを語るだけで行動が伴わない場面が多い。「言葉で鼓舞するが自分は動かない」という状態に陥り、メンバーの信頼を失いやすい。','高責任感型':'自分で抱えすぎて意思決定が遅延するボトルネックになりがち。「引き受ける責任感」と「判断して動く実行力」の間に大きなギャップがある。','洞察提言型リーダー':'語るが動かない、というギャップが周囲の不満につながりやすい。課題を指摘するだけで解決策の実装に関与しない、評論に終始するリスクがある。','強意志型リーダー':'強い主体性の反面、失敗・フィードバックを自分の糧にする力が弱い。過去の成功体験に縛られ、成長が止まりやすい。','実行優先型':'実行スピードは速いが、振り返りがないため同じ失敗を繰り返す。「やって終わり」のサイクルが続き、経験が知恵に変換されないリスクがある。','挑戦先行型':'新しいことへの意欲は高いが、過去の経験から体系的に学ぶ力が弱い。挑戦を重ねても成長のパターンが定着しにくい傾向がある。','環境適応型人材':'外部環境は読めても、自分のキャリアや成長に対して主体的に動けない。状況理解が自分の行動に結びつかず、受け身の姿勢が染みついている。','翻訳型ビジョナリー':'他者のビジョンを翻訳する力はあるが、自分のキャリアビジョンを語れない。方向性の「借り物感」が本人の主体性の欠如として周囲に見透かされる。','我慢強い受託者':'粘り強さはあるが、受け身の仕事しかしない。自らキャリアや成長機会を取りに行く姿勢が乏しく、成長が環境依存になりがち。','夢想家':'ビジョンは描けるが現場の実態・本質課題との接続が弱い。「理想は語れるが何が本当の問題かを捉えられない」という空虚なリーダーシップに陥りやすい。','直感先行型':'直感で動くが根拠が薄い。状況の本質を理解しないまま先回りするため、方向性がずれた準備や空振りのアクションになることが多い。','慎重な実務参謀':'リスク管理は得意だが、全体のビジョンや方向を示す力が弱い。「安全に進める」ことに集中するあまり、チームの推進力を下げてしまうことがある。','処理型マネージャ':'実行力はあるが、主体性・当事者意識に欠ける。「言われたことはやる」が「言われていないことはやらない」傾向が強く、自発的な課題解決が期待しにくい。','粘り先行型':'頑張り続けるが、意思決定力が伴わないため成果に結びつきにくい。努力の量に対して成果が出ず、本人も周囲も消耗するリスクがある。','実務職人':'高い専門性で実務をこなすが、チームへの方向づけや巻き込みが苦手。「個で完結する優秀さ」が組織的なリーダーシップの発揮を妨げる。','内省型フォロワー':'振り返る力はあるが、主体的に動く力が弱い。「どうすべきか考えている」けれど「実際には動いていない」状態に陥りやすい。','深省慎重型':'振り返りすぎて前に進めなくなるリスクがある。失敗への自責が過剰になり、行動の踏み出しに時間がかかる内向きのループに入りやすい。','内省探索型':'自己分析力はあるが、キャリアを能動的に動かす力が乏しい。「わかっているけど動けない」という状態が長期化しやすく、変化に時間がかかる。','組織順応型':'キャリアも状況把握も他者・組織任せで、自律的に考え動く力が育っていない。変化の多い環境では適応が遅れ、常に誰かの指示待ちになってしまう。','模索型キャリア':'自分のキャリアも、チームの方向づけも、どちらも弱い。「どこへ向かうのか」が見えない状態で日々の業務をこなすだけになりがち。','安定志向型':'キャリアもやり切る力も育っておらず、現状維持に甘んじやすい。成長の起点が外部からの強制に限られ、自発的な変化が難しい状態。','模索型':'現状を把握する力も進む方向を描く力も弱く、日々の業務に流されやすい。「なんとなく過ごしている」状態から抜け出す意識の転換が急務。','即応対処型':'状況の本質も見えず、先も読めないため、常にその場しのぎの対応に追われる。問題が常に後手になり、組織の中でも信頼を築きにくい。','安定遂行型マネージャ':'方向を示す力も先読み力もなく、受動的な管理にとどまる。チームの推進力が生まれず、マネージャとしての役割を十分に果たせていない状態。','観察待機型':'主体性も実行力も弱く、課題を前にして動けない。チームの中で「いてもいなくても同じ」と見られるリスクがあり、存在感が薄れていく。','慎重待機型':'決断も行動も継続もできておらず、成果を出せる状態にない。育成・環境整備など外部からの強力な介入なしには変化が難しい状況にある。','協調支援型':'ビジョンも主体性もなく、完全に指示待ちの状態。環境が変わっても自分から対応策を考えることができず、変化への適応が常に遅れる。','安定維持型':'主体的な行動も学習も乏しく、同じ場所に留まり続ける。フィードバックを受け取っても行動変容につながらず、成長の機会を活かせない。','一貫実行型':'実行はするが振り返りがなく、方法の改善が起きない。同じやり方を繰り返すだけで、変化への対応力が育たないまま硬直していく。','持続安定型':'キャリアへの意欲も振り返る力も乏しく、惰性で業務を続けている。成長の問いを自分に向けることなく、現状維持が常態化している。'};

function calcType12(answers,ds){
  // Q1+Q2=Habit(基本/実践), Q3=Skill(応用), Q4+Q5=Mind(発展/高度)
  let mS=0,sS=0,hS=0;
  for(let i=0;i<8;i++){const b=i*5;hS+=(answers[b]+answers[b+1])/2;sS+=answers[b+2];mS+=(answers[b+3]+answers[b+4])/2;}
  const mA=mS/8,sA=sS/8,hA=hS/8;
  const mx=Math.max(mA,sA,hA),mn=Math.min(mA,sA,hA);
  let el;
  if(mx-mn<=0.5)el='balanced';
  else if(mA===mx)el='mind';
  else if(sA===mx)el='skill';
  else el='habit';
  // Strategy=Career(0)+Direction(2)+Anticipation(3), Execution=Ownership(4)+Execution(5)+Grit(6), Reflection=Purpose(1)+Reflection(7)
  const str=(ds[0].total+ds[2].total+ds[3].total)/3;
  const exe=(ds[4].total+ds[5].total+ds[6].total)/3;
  const ref=(ds[1].total+ds[7].total)/2;
  let ori;
  if(str>=exe&&str>=ref)ori='strategy';
  else if(exe>=ref)ori='execution';
  else ori='reflection';
  return{el,ori,mA,sA,hA,str,exe,ref};
}
function getType12(el,ori){return TYPE12.find(t=>t.el===el&&t.ori===ori)||TYPE12[0];}

}

    if(C===2&&myT.ori===partT.ori&&myT.el===partT.el)parts.push('相手の強みドメインがあなたの課題領域をカバーし、協業で高い成果が期待できる。');

  if(R===2){

  }

  return parts.join(' ')||'相性スコアに基づく組み合わせです。';
}
function RadarChart({data}){

  const pt=(i,r)=>[cx+r*Math.cos(ang(i)),cy+r*Math.sin(ang(i))];
  const grids=Array.from({length:LV},(_,l)=>Array.from({length:N},(_,i)=>pt(i,R*(l+1)/LV).join(',')).join(' '));
  const poly=data.map((d,i)=>pt(i,R*Math.max(0,d.v)/25).join(',')).join(' ');
  return h('div',{style:{width:'100%',maxWidth:300,margin:'0 auto'}},h('svg',{viewBox:`0 0 ${S} ${S}`,width:'100%'},
    grids.map((pts,l)=>h('polygon',{key:'g'+l,points:pts,fill:'none',stroke:AG6,strokeWidth:1})),
    Array.from({length:N},(_,i)=>{const[x,y]=pt(i,R);return h('line',{key:'a'+i,x1:cx,y1:cy,x2:x,y2:y,stroke:AG6,strokeWidth:1});}),
    h('polygon',{points:poly,fill:AC,fillOpacity:.18,stroke:AC,strokeWidth:2,strokeLinejoin:'round'}),
    data.map((d,i)=>{const[px,py]=pt(i,R*Math.max(0,d.v)/25);return h('circle',{key:'d'+i,cx:px,cy:py,r:3.5,fill:AC});}),
    data.map((d,i)=>{const[lx,ly]=pt(i,R*1.26);const cos=Math.cos(ang(i));return h('text',{key:'l'+i,x:lx,y:ly,textAnchor:cos>0.15?'start':cos<-0.15?'end':'middle',dominantBaseline:'middle',fontSize:12,fill:AG3,fontFamily:"-apple-system,BlinkMacSystemFont,'Hiragino Sans','Hiragino Kaku Gothic ProN',sans-serif",letterSpacing:'-0.01em'},d.label);})));

  const [ans,setAns]=useState(Array(40).fill(0));

  const setAnswer=(idx,v)=>setAns(p=>{const a=[...p];a[idx]=v;return a;});
  const goNext=()=>{if(di<7){setDi(d=>d+1);scrollTo(0,0);}else{setScr('result');scrollTo(0,0);}};
  const goBack=()=>{if(di>0){setDi(d=>d-1);scrollTo(0,0);}};
  const restart=()=>{setScr('start');setDi(0);setAns(Array(40).fill(0));scrollTo(0,0);};

  if(scr==='start')return h(StartScreen,{onStart:()=>{setDi(0);setAns(Array(40).fill(0));setScr('quiz');scrollTo(0,0);}});
  if(scr==='quiz')return h(QuizScreen,{di,answers:ans,setAnswer,onNext:goNext,onBack:goBack});
  return h(ResultScreen,{answers:ans,onRestart:restart});
}
ReactDOM.createRoot(document.getElementById('root')).render(h(App,null));
</script>
</body>
</html>
